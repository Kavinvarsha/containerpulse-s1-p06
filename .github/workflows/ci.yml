

name: ContainerPulse CI Pipeline



on:

  push:

    branches: [ main ]

  pull_request:

    branches: [ main ]



jobs:

  test:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout code

      uses: actions/checkout@v3



    - name: Set up Python 3.11

      uses: actions/setup-python@v4

      with:

        python-version: '3.11'



    - name: Install dependencies

      run: |

        python -m pip install --upgrade pip

        pip install pandas numpy scikit-learn pytest great_expectations python-dotenv



    - name: Create dummy test data for CI

      run: |

        python3 -c "

import pandas as pd, json

from datetime import datetime

pd.DataFrame({'timestamp':['2026-06-19']*30,'pod':['api-service']*10+['pipeline-worker']*10+['web-service']*10,'container':['api-service']*10+['pipeline-worker']*10+['web-service']*10,'namespace':['monitoring']*30,'metric':['cpu']*30,'value':[0.1,0.2,0.3]*10}).to_csv('metrics_raw.csv',index=False)

pd.DataFrame({'timestamp':['2026-06-19']*3,'container':['api-service','pipeline-worker','web-service'],'pod':['api-service','pipeline-worker','web-service'],'namespace':['monitoring']*3,'cpu':[0.1,0.2,0.3],'memory':[52428800,62428800,72428800],'memory_cache':[1000000,2000000,3000000],'network_rx':[100,200,300],'network_tx':[50,100,150],'restarts':[0,0,0]}).to_csv('metrics_ml_ready.csv',index=False)

json.dump({'generated_at':datetime.now().isoformat(),'total_containers_analyzed':3,'results':[{'container':'api-service','total_records':10,'anomaly_count':1,'anomaly_percentage':10.0,'anomalies':[]},{'container':'pipeline-worker','total_records':10,'anomaly_count':0,'anomaly_percentage':0.0,'anomalies':[]},{'container':'web-service','total_records':10,'anomaly_count':1,'anomaly_percentage':10.0,'anomalies':[]}]},open('anomaly_report.json','w'))

json.dump({'generated_at':datetime.now().isoformat(),'forecast_horizon':'6 steps','forecasts':{'api-service':{'last_value':0.1,'forecast':[0.11,0.12,0.11,0.10,0.11,0.12],'unit':'cpu'},'pipeline-worker':{'last_value':0.2,'forecast':[0.21,0.22,0.21,0.20,0.21,0.22],'unit':'cpu'},'web-service':{'last_value':0.3,'forecast':[0.31,0.32,0.31,0.30,0.31,0.32],'unit':'cpu'}}},open('lstm_forecast.json','w'))

print('Test data created')

"



    - name: Create dummy database

      run: |

        python3 -c "

import sqlite3

conn = sqlite3.connect('containerpulse.db')

conn.execute('''CREATE TABLE IF NOT EXISTS anomaly_events (id INTEGER PRIMARY KEY, detected_at TEXT, container TEXT, total_records INTEGER, anomaly_count INTEGER, anomaly_percentage REAL)''')

conn.execute(\"INSERT INTO anomaly_events VALUES (1,'2026-06-19','api-service',10,1,10.0)\")

conn.commit()

conn.close()

print('Database created')

"



    - name: Run tests

      run: python3 -m pytest test_pipeline.py -v --tb=short
